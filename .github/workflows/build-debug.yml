name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 👇 Lister où Gradle a mis l'APK
      - name: List outputs (debug)
        run: |
          echo "=== List app/build ==="
          ls -R app/build || true
          echo "=== Search *.apk under outputs ==="
          find app/build/outputs -type f -name "*.apk" -print || true

      # 👇 Uploader n'importe quel APK généré sous outputs/
      - name: Upload Debug APK(s)
        uses: actions/upload-artifact@v4
        with:
          name: ZebraPowerEventBridge-debug
          path: |
            app/build/outputs/**/*.apk
          if-no-files-found: warn  # évite l'échec si rien n'est trouvé
