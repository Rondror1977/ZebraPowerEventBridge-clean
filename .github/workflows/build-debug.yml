name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Télécharge Gradle 8.2.1 et génère un wrapper COMPLET (jar + scripts)
      - name: Generate Gradle Wrapper
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2.1-bin.zip
          unzip gradle-8.2.1-bin.zip
          ./gradle-8.2.1/bin/gradle wrapper --gradle-version 8.2.1

      - name: Permissions for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZebraPowerEventBridge-debug
          path: app/build/outputs/**/*.apk
